services:
  - type: web
    name: z-conversion-engine
    env: python
    plan: free
    buildCommand: pip install -r agent/requirements.txt
    startCommand: uvicorn agent.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ENABLE_LIVE_SENDING
        value: "false"
